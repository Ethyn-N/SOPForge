spring.application.name=securedoc-ai
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=jdbc:postgresql://localhost:5432/securedoc_ai
spring.datasource.username=securedoc_user
spring.datasource.password=SecureDoc123!

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.baseline-on-migrate=true

jwt.secret=secure-doc-ai-jwt-secret-key-must-be-at-least-32-characters
jwt.expiration-ms=86400000

securedoc.storage.upload-dir=uploads/documents

securedoc.ai.ollama.base-url=http://localhost:11434
securedoc.ai.ollama.model=qwen2.5:14b

sopforge.admin.bootstrap.enabled=${SOPFORGE_ADMIN_BOOTSTRAP_ENABLED:false}
sopforge.admin.bootstrap.reset-password=${SOPFORGE_ADMIN_BOOTSTRAP_RESET_PASSWORD:false}
sopforge.admin.bootstrap.email=${SOPFORGE_ADMIN_EMAIL:}
sopforge.admin.bootstrap.password=${SOPFORGE_ADMIN_PASSWORD:}

server.port=8080
