services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: sopforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-securedoc_ai}
      POSTGRES_USER: ${POSTGRES_USER:-securedoc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SecureDoc123!}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - sopforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securedoc_user} -d ${POSTGRES_DB:-securedoc_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sopforge_postgres_data:
